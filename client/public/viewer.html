<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect Aire Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0f0; font-family: system-ui, sans-serif; overflow: hidden; }
    #viewer-canvas { display: block; width: 100vw; height: 100vh; }

    #header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      background: linear-gradient(to bottom, rgba(26,26,46,0.95), transparent);
      pointer-events: none; z-index: 10;
    }
    #logo-text { font-size: 13px; font-weight: 700; color: #6060cc; letter-spacing: 0.08em; text-transform: uppercase; }
    #project-name { font-size: 15px; font-weight: 600; color: #e0e0f0; }
    #project-desc { font-size: 12px; color: #8888aa; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: #1a1a2e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 100;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #loading-logo { font-size: 18px; font-weight: 700; color: #6060cc; letter-spacing: 0.1em; }
    #loading-label { font-size: 13px; color: #8888aa; min-height: 18px; }
    #progress-track {
      width: 240px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    #progress-bar {
      height: 100%; width: 0%; background: #6060cc;
      border-radius: 2px; transition: width 0.15s ease;
    }
    #loading-size { font-size: 11px; color: #555577; }

    /* ── Controles ── */
    #status {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,40,0.9); color: #aaaacc;
      padding: 8px 20px; border-radius: 20px; font-size: 13px;
      border: 1px solid rgba(100,100,180,0.3); display: none; z-index: 10;
    }
    #info-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(20,180,120,0.15); color: #4ec9a0;
      padding: 6px 18px; border-radius: 20px; font-size: 13px;
      border: 1px solid rgba(78,201,160,0.3);
      opacity: 0; transition: opacity 0.5s; z-index: 10;
    }
    #controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
    .ctrl-btn {
      width: 40px; height: 40px;
      background: rgba(30,30,60,0.85); border: 1px solid rgba(100,100,180,0.35);
      border-radius: 10px; color: #aaaacc; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .ctrl-btn:hover { background: rgba(60,60,120,0.9); color: #fff; }
    #format-badge {
      position: fixed; top: 60px; right: 20px;
      background: rgba(100,60,200,0.2); color: #a090ff;
      padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600;
      border: 1px solid rgba(100,60,200,0.35); letter-spacing: 0.05em; z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="viewer-canvas"></canvas>

  <!-- Loading overlay com progresso real -->
  <div id="loading-overlay">
    <div id="loading-logo">PERFECAIRE</div>
    <div id="progress-track"><div id="progress-bar"></div></div>
    <div id="loading-label">Iniciando…</div>
    <div id="loading-size"></div>
  </div>

  <div id="header">
    <span id="logo-text">PerfecAire</span>
    <div>
      <div id="project-name">Carregando…</div>
      <div id="project-desc"></div>
    </div>
  </div>
  <div id="format-badge">—</div>
  <div id="status"></div>
  <div id="info-toast"></div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-fit"        title="Centralizar">⊙</button>
    <button class="ctrl-btn" id="btn-grid"       title="Grade">⊞</button>
    <button class="ctrl-btn" id="btn-wire"       title="Wireframe">⬡</button>
    <button class="ctrl-btn" id="btn-fullscreen" title="Tela cheia">⛶</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';
    import { OBJLoader }     from 'three/addons/loaders/OBJLoader.js';
    import { FBXLoader }     from 'three/addons/loaders/FBXLoader.js';

    // ── UI helpers ────────────────────────────────────────────────────────────
    const overlay     = document.getElementById('loading-overlay');
    const progressBar = document.getElementById('progress-bar');
    const loadingLabel = document.getElementById('loading-label');
    const loadingSize  = document.getElementById('loading-size');

    function setProgress(pct, label, bytes) {
      progressBar.style.width = Math.min(100, pct) + '%';
      if (label)  loadingLabel.textContent = label;
      if (bytes)  loadingSize.textContent  = formatBytes(bytes);
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
      setTimeout(() => { overlay.style.display = 'none'; }, 450);
    }

    function formatBytes(b) {
      if (b > 1048576) return (b / 1048576).toFixed(1) + ' MB';
      if (b > 1024)    return (b / 1024).toFixed(0) + ' KB';
      return b + ' B';
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
      el.style.color = isError ? '#ff6b6b' : '#aaaacc';
    }

    function showInfo(msg) {
      const el = document.getElementById('info-toast');
      el.textContent = msg;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 3000);
    }

    // ── Three.js setup ────────────────────────────────────────────────────────
    const canvas = document.getElementById('viewer-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // limita DPR para performance
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 50, 200);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(10, 10, 10);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.screenSpacePanning = true;
    controls.minDistance = 0.5;
    controls.maxDistance = 500;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    scene.add(sun);
    // .add() devolve a cena, não a luz — por isso a luz de preenchimento
    // precisa ser posicionada separadamente (antes ficava em 0,0,0).
    const fill = new THREE.DirectionalLight(0xaaccff, 0.4);
    fill.position.set(-20, 10, -20);
    scene.add(fill);

    const grid = new THREE.GridHelper(100, 50, 0x444466, 0x333355);
    grid.material.opacity = 0.4;
    grid.material.transparent = true;
    scene.add(grid);

    // ── DRACO loader (descompressão de geometria no browser) ─────────────────
    // Se o modelo foi comprimido com Draco, isso acelera muito o download.
    const draco = new DRACOLoader();
    draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/');

    // ── Loaders ───────────────────────────────────────────────────────────────
    function loadGLTF(url, slug) {
      return new Promise((resolve, reject) => {
        const loader = new GLTFLoader();
        loader.setDRACOLoader(draco);

        // Redireciona requisições de arquivos secundários (.bin, texturas)
        // para /api/proxy/:slug/:filename em vez de tentar a URL original
        loader.setResourcePath(`/api/proxy/${slug}/`);

        loader.load(
          url,
          gltf => resolve(gltf.scene),
          (event) => {
            if (event.total) {
              const pct = (event.loaded / event.total) * 100;
              setProgress(pct, `Transferindo… ${Math.round(pct)}%`, event.loaded);
            } else {
              // Sem Content-Length: anima a barra de forma indeterminada
              setProgress(50, `Transferindo… ${formatBytes(event.loaded)}`);
            }
          },
          reject
        );
      });
    }

    function loadOBJ(url) {
      return new Promise((resolve, reject) => {
        setProgress(30, 'Carregando OBJ…');
        new OBJLoader().load(url, resolve, null, reject);
      });
    }

    function loadFBX(url) {
      return new Promise((resolve, reject) => {
        setProgress(30, 'Carregando FBX…');
        new FBXLoader().load(url, fbx => {
          fbx.scale.setScalar(0.01);
          resolve(fbx);
        }, null, reject);
      });
    }

    async function loadModel(url, fileType, slug) {
      setProgress(5, 'Conectando ao servidor…');
      const prev = scene.getObjectByName('__model__');
      if (prev) scene.remove(prev);
      try {
        let model;
        if (fileType === 'ifc' || fileType === 'gltf' || fileType === 'glb') {
          model = await loadGLTF(url, slug);
        } else if (fileType === 'obj') {
          model = await loadOBJ(url);
        } else if (fileType === 'fbx') {
          model = await loadFBX(url);
        } else {
          throw new Error('Formato não suportado: ' + fileType);
        }

        setProgress(95, 'Construindo cena…');
        model.name = '__model__';
        scene.add(model);
        fitCamera(model);

        // Espera um frame renderizar antes de esconder o overlay
        requestAnimationFrame(() => {
          setProgress(100, 'Pronto!');
          setTimeout(hideOverlay, 300);
          showInfo('✓ Modelo carregado');
          document.getElementById('format-badge').textContent = fileType.toUpperCase();
        });
      } catch (err) {
        console.error('Erro ao carregar modelo:', err);
        loadingLabel.textContent = 'Erro: ' + err.message;
        loadingLabel.style.color = '#ff6b6b';
        progressBar.style.background = '#cc4444';
      }
    }

    function fitCamera(object) {
      const box    = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim === 0) { camera.position.set(10,10,10); controls.update(); return; }
      controls.target.copy(center);
      const dist = maxDim * 1.5;
      camera.position.copy(center).add(new THREE.Vector3(dist, dist * 0.8, dist));
      camera.near = maxDim * 0.001;
      camera.far  = maxDim * 100;
      camera.updateProjectionMatrix();
      controls.update();
      grid.position.y = box.min.y || 0;
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      const slug = window.location.pathname.split('/').filter(Boolean).pop();
      if (!slug) {
        loadingLabel.textContent = 'Nenhum projeto especificado';
        loadingLabel.style.color = '#ff6b6b';
        return;
      }

      setProgress(2, 'Buscando informações do projeto…');

      try {
        const res = await fetch('/api/projects/' + slug);
        if (!res.ok) throw new Error('Projeto não encontrado');
        const project = await res.json();

        document.title = project.name + ' — PerfecAire';
        document.getElementById('project-name').textContent = project.name;
        if (project.description) document.getElementById('project-desc').textContent = project.description;

        setProgress(8, 'Iniciando download…');
        await loadModel('/api/proxy/' + project.slug, project.file_type, project.slug);
      } catch (err) {
        loadingLabel.textContent = err.message;
        loadingLabel.style.color = '#ff6b6b';
      }
    }

    init();

    // ── Botões de controle ────────────────────────────────────────────────────
    document.getElementById('btn-fit').addEventListener('click', () => {
      const m = scene.getObjectByName('__model__');
      if (m) fitCamera(m);
    });

    document.getElementById('btn-grid').addEventListener('click', function() {
      grid.visible = !grid.visible;
      this.style.color = grid.visible ? '#aaaacc' : '#555588';
    });

    let wireOn = false;
    document.getElementById('btn-wire').addEventListener('click', function() {
      wireOn = !wireOn;
      const m = scene.getObjectByName('__model__');
      if (m) m.traverse(c => { if (c.isMesh) c.material.wireframe = wireOn; });
      this.style.color = wireOn ? '#a090ff' : '#aaaacc';
    });

    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
  </script>
</body>
</html>
