<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerfecAire Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #viewer-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Header flutuante */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: linear-gradient(to bottom, rgba(26,26,46,0.95), transparent);
      pointer-events: none;
      z-index: 10;
    }

    #logo {
      height: 32px;
      opacity: 0.9;
    }

    #project-name {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #project-desc {
      font-size: 12px;
      color: #8888aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Status de carregamento */
    #status {
      position: fixed;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,40,0.9);
      color: #aaaacc;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid rgba(100,100,180,0.3);
      display: none;
      z-index: 10;
    }

    /* Toast de sucesso */
    #info-toast {
      position: fixed;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(20,180,120,0.15);
      color: #4ec9a0;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid rgba(78,201,160,0.3);
      opacity: 0;
      transition: opacity 0.5s;
      z-index: 10;
    }

    /* Controles flutuantes */
    #controls {
      position: fixed;
      bottom: 20px; right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .ctrl-btn {
      width: 40px; height: 40px;
      background: rgba(30,30,60,0.85);
      border: 1px solid rgba(100,100,180,0.35);
      border-radius: 10px;
      color: #aaaacc;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .ctrl-btn:hover { background: rgba(60,60,120,0.9); color: #fff; }

    /* Badge de formato */
    #format-badge {
      position: fixed;
      top: 60px; right: 20px;
      background: rgba(100,60,200,0.2);
      color: #a090ff;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(100,60,200,0.35);
      letter-spacing: 0.05em;
      z-index: 10;
    }

    /* Logo texto fallback */
    #logo-text {
      font-size: 13px;
      font-weight: 700;
      color: #6060cc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="viewer-canvas"></canvas>

  <div id="header">
    <span id="logo-text">PerfecAire</span>
    <div>
      <div id="project-name">Carregando…</div>
      <div id="project-desc"></div>
    </div>
  </div>

  <div id="format-badge">—</div>
  <div id="status" style="display:none"></div>
  <div id="info-toast"></div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-fit" title="Centralizar modelo">⊙</button>
    <button class="ctrl-btn" id="btn-grid" title="Mostrar/ocultar grade">⊞</button>
    <button class="ctrl-btn" id="btn-wire" title="Wireframe">⬡</button>
    <button class="ctrl-btn" id="btn-fullscreen" title="Tela cheia">⛶</button>
  </div>

  <script src="/viewer.bundle.js"></script>
  <script>
    // Botão centralizar
    document.getElementById('btn-fit').addEventListener('click', () => {
      const model = window._scene && window._scene.getObjectByName('__model__');
      if (model) window._fitCamera && window._fitCamera(model);
    });

    // Botão grade
    document.getElementById('btn-grid').addEventListener('click', function() {
      const grid = window._grid;
      if (grid) {
        grid.visible = !grid.visible;
        this.style.color = grid.visible ? '#aaaacc' : '#555588';
      }
    });

    // Botão wireframe
    let wireframeOn = false;
    document.getElementById('btn-wire').addEventListener('click', function() {
      wireframeOn = !wireframeOn;
      const model = window._scene && window._scene.getObjectByName('__model__');
      if (model) {
        model.traverse(c => {
          if (c.isMesh) c.material.wireframe = wireframeOn;
        });
      }
      this.style.color = wireframeOn ? '#a090ff' : '#aaaacc';
    });

    // Fullscreen
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
  </script>
</body>
</html>
