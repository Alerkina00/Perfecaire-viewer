<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — PerfecAire Viewer</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223a;
      --border: rgba(100,100,200,0.2);
      --accent: #6060cc;
      --accent-light: #8080ee;
      --text: #e0e0f0;
      --text-muted: #8888aa;
      --danger: #e05555;
      --success: #4ec9a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 360px;
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--accent-light);
    }

    .login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* ── Admin ── */
    #admin-screen { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo { font-size: 14px; font-weight: 700; color: var(--accent-light); letter-spacing: 0.08em; }
    header h2 { font-size: 15px; font-weight: 500; flex: 1; }

    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── Upload card ── */
    .upload-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .upload-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 20px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    input[type=text], input[type=password], textarea, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }
    .dropzone:hover, .dropzone.drag-over {
      border-color: var(--accent);
      background: rgba(96,96,204,0.06);
    }
    .dropzone .icon { font-size: 32px; margin-bottom: 8px; }
    .dropzone p { font-size: 13px; color: var(--text-muted); }
    .dropzone strong { color: var(--accent-light); }
    .dropzone .file-info { font-size: 13px; color: var(--success); margin-top: 8px; font-weight: 500; }

    /* Botões */
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      font-family: inherit;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }

    /* Progress */
    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
      display: none;
    }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; width: 0%; }

    /* ── Tabela de projetos ── */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .projects-grid {
      display: grid;
      gap: 14px;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .project-qr img { width: 64px; height: 64px; border-radius: 8px; }

    .project-info { flex: 1; }
    .project-info .name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .project-info .meta { font-size: 12px; color: var(--text-muted); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-ifc  { background: rgba(96,96,204,0.15); color: #a0a0ee; border: 1px solid rgba(96,96,204,0.3); }
    .badge-gltf, .badge-glb { background: rgba(78,201,160,0.15); color: #4ec9a0; border: 1px solid rgba(78,201,160,0.3); }
    .badge-obj  { background: rgba(240,180,60,0.15); color: #e0b040; border: 1px solid rgba(240,180,60,0.3); }
    .badge-fbx  { background: rgba(220,90,90,0.15); color: #e08080; border: 1px solid rgba(220,90,90,0.3); }

    .project-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Alert */
    .alert {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert-error   { background: rgba(224,85,85,0.12); color: #ff8888; border: 1px solid rgba(224,85,85,0.3); }
    .alert-success { background: rgba(78,201,160,0.12); color: var(--success); border: 1px solid rgba(78,201,160,0.3); }
  </style>
</head>
<body>

<!-- ══ TELA DE LOGIN ══════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>PerfecAire</h1>
    <p>Painel de gerenciamento do visualizador 3D</p>

    <div class="alert alert-error" id="login-error"></div>

    <div class="form-group" style="margin-bottom:14px">
      <label>Usuário</label>
      <input type="text" id="username" value="admin" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:24px">
      <label>Senha</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btn-login" style="width:100%">Entrar</button>
  </div>
</div>

<!-- ══ PAINEL ADMIN ═══════════════════════════════════════════════════════ -->
<div id="admin-screen">
  <header>
    <span class="logo">PERFECAIRE</span>
    <h2>Visualizador 3D — Gerenciador de Projetos</h2>
    <button class="btn btn-ghost" id="btn-logout" style="font-size:13px">Sair</button>
  </header>

  <div class="main">
    <!-- Upload -->
    <div class="upload-card">
      <h3>Novo Projeto</h3>

      <div class="alert alert-error" id="upload-error"></div>
      <div class="alert alert-success" id="upload-success"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Nome do projeto *</label>
          <input type="text" id="proj-name" placeholder="Ex: HVAC Bloco A — Piso 2">
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="proj-desc" placeholder="Opcional">
        </div>
      </div>

      <div class="dropzone" id="dropzone">
        <div class="icon">📁</div>
        <p>Arraste o arquivo ou <strong>clique para selecionar</strong></p>
        <p style="margin-top:6px; font-size:12px">Suporte: <strong>IFC · GLTF · GLB · OBJ · FBX</strong> — até 500MB</p>
        <div class="file-info" id="file-info" style="display:none"></div>
        <input type="file" id="file-input" style="display:none" accept=".ifc,.gltf,.glb,.obj,.fbx">
      </div>

      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <button class="btn btn-primary" id="btn-upload" disabled>Enviar projeto</button>
    </div>

    <!-- Projetos -->
    <div class="section-title">
      <span>Projetos</span>
      <button class="btn btn-ghost" id="btn-refresh" style="font-size:12px">↻ Atualizar</button>
    </div>
    <div class="projects-grid" id="projects-grid">
      <div class="empty-state">Carregando…</div>
    </div>
  </div>
</div>

<script>
  const API = '';
  let token = localStorage.getItem('pa_token');

  // ─── Auth ────────────────────────────────────────────────────────────────

  async function apiGet(path) {
    const res = await fetch(API + path, { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401) { logout(); throw new Error('Não autenticado'); }
    return res.json();
  }

  async function apiDelete(path) {
    const res = await fetch(API + path, { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401) { logout(); throw new Error('Não autenticado'); }
    return res.json();
  }

  function logout() {
    localStorage.removeItem('pa_token');
    token = null;
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function checkAuth() {
    if (!token) return showLogin();
    try {
      await apiGet('/api/auth/me');
      showAdmin();
    } catch {
      showLogin();
    }
  }

  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadProjects();
  }

  // ─── Login ───────────────────────────────────────────────────────────────

  document.getElementById('btn-login').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error;
      errEl.style.display = 'block';
      return;
    }

    token = data.token;
    localStorage.setItem('pa_token', token);
    showAdmin();
  });

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });

  document.getElementById('btn-logout').addEventListener('click', logout);

  // ─── Dropzone ────────────────────────────────────────────────────────────

  let selectedFile = null;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');

  dropzone.addEventListener('click', () => fileInput.click());

  dropzone.addEventListener('dragover', e => {
    e.preventDefault();
    dropzone.classList.add('drag-over');
  });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  function setFile(file) {
    selectedFile = file;
    const ext = file.name.split('.').pop().toLowerCase();
    const allowed = ['ifc','gltf','glb','obj','fbx'];
    if (!allowed.includes(ext)) {
      alert(`Formato .${ext} não suportado. Use: ${allowed.join(', ')}`);
      selectedFile = null;
      return;
    }
    const size = file.size > 1024*1024
      ? (file.size / 1024 / 1024).toFixed(1) + ' MB'
      : (file.size / 1024).toFixed(0) + ' KB';
    const info = document.getElementById('file-info');
    info.textContent = `${file.name} (${size})`;
    info.style.display = 'block';
    document.getElementById('btn-upload').disabled = false;
  }

  // ─── Upload ──────────────────────────────────────────────────────────────

  document.getElementById('btn-upload').addEventListener('click', async () => {
    const name = document.getElementById('proj-name').value.trim();
    const desc = document.getElementById('proj-desc').value.trim();
    const errEl = document.getElementById('upload-error');
    const okEl  = document.getElementById('upload-success');
    errEl.style.display = 'none';
    okEl.style.display = 'none';

    if (!name) { errEl.textContent = 'Nome do projeto obrigatório'; errEl.style.display = 'block'; return; }
    if (!selectedFile) { errEl.textContent = 'Selecione um arquivo'; errEl.style.display = 'block'; return; }

    const form = new FormData();
    form.append('name', name);
    form.append('description', desc);
    form.append('file', selectedFile);

    const btn = document.getElementById('btn-upload');
    btn.disabled = true;
    btn.textContent = 'Enviando…';

    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    progressBar.style.display = 'block';

    try {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', API + '/api/projects');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          progressFill.style.width = (e.loaded / e.total * 100) + '%';
        }
      };

      const result = await new Promise((resolve, reject) => {
        xhr.onload = () => resolve(JSON.parse(xhr.responseText));
        xhr.onerror = reject;
        xhr.send(form);
      });

      if (xhr.status >= 400) {
        errEl.textContent = result.error || 'Erro no upload';
        errEl.style.display = 'block';
      } else {
        okEl.innerHTML = `✓ Projeto criado! <a href="${result.viewerUrl}" target="_blank" style="color:var(--success)">Abrir viewer →</a>`;
        okEl.style.display = 'block';
        document.getElementById('proj-name').value = '';
        document.getElementById('proj-desc').value = '';
        selectedFile = null;
        document.getElementById('file-info').style.display = 'none';
        fileInput.value = '';
        loadProjects();
      }
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enviar projeto';
      progressBar.style.display = 'none';
      progressFill.style.width = '0%';
    }
  });

  // ─── Lista de projetos ───────────────────────────────────────────────────

  async function loadProjects() {
    const grid = document.getElementById('projects-grid');
    grid.innerHTML = '<div class="empty-state">Carregando…</div>';

    try {
      const projects = await apiGet('/api/projects');
      if (!projects.length) {
        grid.innerHTML = '<div class="empty-state">Nenhum projeto ainda. Faça o primeiro upload!</div>';
        return;
      }

      grid.innerHTML = projects.map(p => {
        const size = p.file_size > 1024*1024
          ? (p.file_size/1024/1024).toFixed(1)+'MB'
          : (p.file_size/1024).toFixed(0)+'KB';
        const date = new Date(p.created_at).toLocaleDateString('pt-BR');
        const viewerUrl = `/v/${p.slug}`;

        return `
          <div class="project-card">
            <div class="project-qr">
              ${p.qr_url ? `<img src="${p.qr_url}" alt="QR Code">` : '<div style="width:64px;height:64px;background:#333;border-radius:8px"></div>'}
            </div>
            <div class="project-info">
              <div class="name">${p.name}</div>
              <div class="meta">
                <span class="badge badge-${p.file_type}">${p.file_type.toUpperCase()}</span>
                &nbsp;${size} &nbsp;·&nbsp; ${date}
                ${p.description ? `&nbsp;·&nbsp; ${p.description}` : ''}
              </div>
            </div>
            <div class="project-actions">
              <a href="${viewerUrl}" target="_blank">
                <button class="btn btn-primary" style="font-size:13px">Abrir</button>
              </a>
              <button class="btn btn-ghost" style="font-size:13px" onclick="copyLink('${viewerUrl}')">Copiar link</button>
              <button class="btn btn-danger" style="font-size:13px" onclick="deleteProject(${p.id})">Excluir</button>
            </div>
          </div>
        `;
      }).join('');
    } catch (err) {
      grid.innerHTML = `<div class="empty-state">Erro ao carregar: ${err.message}</div>`;
    }
  }

  function copyLink(path) {
    navigator.clipboard.writeText(window.location.origin + path);
    alert('Link copiado!');
  }

  async function deleteProject(id) {
    if (!confirm('Excluir este projeto? O arquivo 3D será removido permanentemente.')) return;
    try {
      await apiDelete(`/api/projects/${id}`);
      loadProjects();
    } catch (err) {
      alert('Erro ao excluir: ' + err.message);
    }
  }

  document.getElementById('btn-refresh').addEventListener('click', loadProjects);

  // ─── Init ────────────────────────────────────────────────────────────────

  checkAuth();
</script>
</body>
</html>
